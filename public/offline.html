<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e40af" />
    <title>Planasia — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f6f8;
        color: #1e3a5f;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: #fff;
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: 0 4px 24px rgba(30, 64, 175, 0.12);
      }
      h1 { font-size: 1.25rem; margin-bottom: 8px; }
      p { font-size: 0.875rem; color: #64748b; line-height: 1.5; margin-bottom: 20px; }
      button {
        background: #1e40af;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&apos;re offline</h1>
      <p>Planasia needs an internet connection for live store listings and checkout. Cached pages may still be available.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
